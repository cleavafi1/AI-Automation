# Netlify configuration for this Next.js (App Router) app.
# The @netlify/plugin-nextjs plugin turns the Next build into serverless/edge
# functions so SSR pages, API routes, dynamic routes, and the /admin auth checks
# all run server-side — not as static files. Netlify installs the plugin
# automatically from the [[plugins]] block below.

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Node 22: @supabase/supabase-js (realtime-js) needs a global WebSocket, which
  # only exists in Node 22+. On Node 20 createClient throws "native WebSocket
  # not found". 22 is a Netlify-supported LTS and satisfies Next 14 too.
  NODE_VERSION = "22"

# Custom serverless functions (e.g. the quote-generation background function)
# live here, deployed alongside the Next.js runtime.
[functions]
  directory = "netlify/functions"

[[plugins]]
  package = "@netlify/plugin-nextjs"
